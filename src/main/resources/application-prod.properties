# application-prod.properties - MySQL database (til produktion)
spring.datasource.url=jdbc:mysql://localhost:3306/dronepizza_db
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=dit_mysql_password

# MySQL dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# SSL (slå fra til lokal udvikling)
spring.datasource.properties.useSSL=false