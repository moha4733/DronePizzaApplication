<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pizza - Administrationspanel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Drone Pizza</h1>
        <p>Styring af droner og pizza leveringer</p>
    </div>

    <div class="button-group">
        <button class="btn btn-primary" onclick="createDrone()">Opret ny drone</button>
        <button class="btn btn-warning" onclick="simulateCustomer()">Simuler kunde</button>
        <button class="btn btn-secondary" onclick="refreshDeliveries()">Opdater liste</button>
    </div>

    <div id="message" class="message"></div>
    <div id="loading" class="loading" style="display: none;"> Henter data...</div>

    <h2>Aktive Leveringer</h2>
    <div id="deliveryList"></div>
</div>

<script src="/js/script.js"></script>
</body>
</html>
